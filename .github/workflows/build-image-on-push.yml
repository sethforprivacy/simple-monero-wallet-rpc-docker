name: "Test build of image when Dockerfile is changed"

on:
  push:
    paths:
    - 'Dockerfile'
    branches-ignore:
    - main
  pull_request:
    paths:
    - 'Dockerfile'
  workflow_dispatch:

# Least-privilege default token (this workflow only reads the repo and pulls cache)
permissions:
  contents: read

# Cancel superseded runs for the same ref to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/simple-monero-wallet-rpc

jobs:
  rebuild-container:
    name: "Build image with cache"
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Prepare platform matrix for arm64
        if: runner.arch == 'ARM64'
        run: |
          echo "PLATFORM=linux/arm64" >> $GITHUB_ENV
          echo "DIGEST_NAME=arm64" >> $GITHUB_ENV
      - name: Prepare platform matrix for amd64
        if: runner.arch == 'X64'
        run: |
          echo "PLATFORM=linux/amd64" >> $GITHUB_ENV
          echo "DIGEST_NAME=amd64" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Test build of image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: false
          load: true
          platforms: ${{ env.PLATFORM }}
          tags: simple-monero-wallet-rpc:testing
          cache-from: |
            type=registry,ref=${{ env.GHCR_REPO }}:buildcache-${{ env.DIGEST_NAME }}
            type=registry,ref=${{ env.GHCR_REPO }}:latest
      - name: Verify reported version matches the pinned Monero tag
        run: |
          set -euo pipefail
          EXPECTED="$(awk -F= '/^ARG MONERO_BRANCH=/{print $2; exit}' Dockerfile)"
          echo "Expecting monero-wallet-rpc to report: ${EXPECTED}"
          OUT="$(docker run --rm simple-monero-wallet-rpc:testing --version 2>&1 || true)"
          echo "Reported: ${OUT}"
          echo "${OUT}" | grep -q "${EXPECTED}" \
            || { echo "::error::monero-wallet-rpc --version does not contain expected tag ${EXPECTED}"; exit 1; }
      - name: Verify the container starts and stays up
        run: |
          set -uo pipefail
          CID="$(docker run -d simple-monero-wallet-rpc:testing --wallet-dir=/home/monero/wallet --rpc-bind-port=18083 --daemon-host=node.sethforprivacy.com:18089 --trusted-daemon)"
          sleep 20
          if [ "$(docker inspect -f '{{.State.Running}}' "$CID" 2>/dev/null || echo false)" != "true" ]; then
            echo "::error::container exited early"; docker logs "$CID" 2>&1 || true
            docker rm -f "$CID" >/dev/null 2>&1 || true; exit 1
          fi
          docker rm -f "$CID" >/dev/null 2>&1 || true
